<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiForEino</title>
    <script src="./vue.global.prod.js"></script>
    <link rel="stylesheet" href="home.css">
    <link rel="icon" type="image/png" href="./favicon.png" />
</head>
<body>
    <div id="app">
        <!-- 头部背景图区域（纯展示，不包含视频） -->
        <div class="main-content">
            <div class="header-logo">
                <svg class="static-svg" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="2"></circle>
                </svg>
                <div class="logo-text">AiForEino</div>
            </div>

            <div class="app">
                <div class="hero">
                    <h1>AIFOREINO</h1>
                    <p>基于<strong>EINO</strong>开发的RAG智能体</p>
                    <div class="btn-group">
                        <button class="btn btn-primary" @click="handleRegister">立即体验</button>
                        <button class="btn btn-outline" @click="handleLearnMore">了解更多</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 独立的视频区域（放在头部下方、轮播上方） -->
        <div class="video-section">
            <!-- 新增视频区域标题和副标题 -->
            <h2 class="video-title">加速你的 AI 工作流</h2>
            <p class="video-subtitle">从首次查询到最终集成，AiForEino 提供基于 RAG 的工具，助你更快构建和部署 AI 应用。</p>
            
            <div class="video-container">
                <div class="video-wrapper">
                    <video ref="videoPlayer" class="video-player" src="https://videos.ctfassets.net/8aevphvgewt8/490cvTcPE95XqUKGA4C2Kn/427a8803b029857c58167cce0e855191/github-copilot-agent-mode.mp4" loop muted preload="metadata"></video>
                </div>
                    <!-- 播放/暂停按钮 -->
                <button class="video-play-btn" @click="togglePlay">
                    <svg v-if="!isPlaying" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    <svg v-else xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="4" width="4" height="16"></rect>
                        <rect x="14" y="4" width="4" height="16"></rect>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 轮播区域 -->
        <div class="marquee-section">
            <div class="marquee-container">
                <div class="marquee-track">
                    <div v-for="(logo, index) in logos" :key="'first-' + index" class="logo-item">
                        <div v-html="logo.svg"></div>
                    </div>
                    <div v-for="(logo, index) in logos" :key="'second-' + index" class="logo-item">
                        <div v-html="logo.svg"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- footer区域 -->
        <div class="footer-container">
            <iframe src="footer.html" class="footer-iframe" scrolling="no"></iframe>
        </div>
    </div>

                const togglePlay = () => {
                    if (!videoPlayer.value) return;
                    if (isPlaying.value) {
                        videoPlayer.value.pause();
                    } else {
                        videoPlayer.value.play();
                    }
                    isPlaying.value = !isPlaying.value;
                };

                return {
                    videoPlayer,
                    isPlaying,
                    togglePlay
                };

                    const height = iframe.contentWindow.document.body.scrollHeight;
                    iframe.style.height = height + 'px';
                    iframe.style.minHeight = 'auto';

                    iframe.style.minHeight = '900px';
                }
            };
