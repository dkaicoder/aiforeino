<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiForEino Footer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0a0a0a;
        }

        .footer {
            background-color: #0a0a0a;
            color: #9ca3af;
            padding: 60px 0 30px;
            border-top: 1px solid #1f2937;
        }

        .footer-container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .footer-content {
            display: grid;
            grid-template-columns: 2fr 1fr 1.5fr 1.5fr;
            gap: 60px;
            margin-bottom: 40px;
        }

        .footer-brand {
            max-width: 300px;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .brand-name {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
        }

        .brand-desc {
            font-size: 14px;
            line-height: 1.8;
            color: #6b7280;
            margin-bottom: 24px;
        }

        .social-links {
            display: flex;
            gap: 12px;
        }

        .social-link {
            width: 36px;
            height: 36px;
            border: 1px solid #374151;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            border-color: #06b6d4;
            color: #06b6d4;
        }

        .footer-section h3 {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .footer-links {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 14px;
        }

        .footer-links a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #06b6d4;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .contact-icon {
            color: #6b7280;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .contact-label {
            color: #6b7280;
            margin-bottom: 4px;
            font-size: 13px;
        }

        .contact-value {
            color: #ffffff;
        }

        .subscribe-desc {
            font-size: 14px;
            line-height: 1.6;
            color: #6b7280;
            margin-bottom: 16px;
        }

        .subscribe-form {
            display: flex;
            gap: 10px;
        }

        .subscribe-input {
            flex: 1;
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 6px;
            padding: 10px 14px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .subscribe-input::placeholder {
            color: #6b7280;
        }

        .subscribe-input:focus {
            border-color: #06b6d4;
        }

        .subscribe-btn {
            background-color: #0891b2;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            white-space: nowrap;
        }

        .subscribe-btn:hover {
            background-color: #06b6d4;
        }

        .footer-bottom {
            border-top: 1px solid #1f2937;
            padding-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #6b7280;
        }

        .footer-bottom-links {
            display: flex;
            gap: 24px;
        }

        .footer-bottom-links a {
            color: #6b7280;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-bottom-links a:hover {
            color: #9ca3af;
        }

        /* 响应式 - 768px */
        @media (max-width: 768px) {
            .footer-container {
                padding: 0 20px;
            }

            .footer-content {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .footer-brand {
                max-width: 100%;
            }

            .footer-bottom {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .footer-bottom-links {
                gap: 16px;
            }

            .subscribe-form {
                flex-direction: column;
            }

            .subscribe-btn {
                width: 100%;
            }
        }

        /* 图标样式 */
        .icon {
            display: inline-block;
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>
    <div id="app">
        <footer class="footer">

                    </div>

                    <!-- 快速链接 -->

                    <!-- 联系我 -->

                        <h3>联系我</h3>

                            </span>
                            <div>
                                <div class="contact-label">电话</div>
                                <div class="contact-value">+86 17608077964</div>
                            </div>
                        </div>
                        <div class="contact-item">
                            <span class="contact-icon">
                                <svg class="icon" viewBox="0 0 24 24" fill="currentColor">

                </div>

                <!-- 订阅更新 -->
                <div class="footer-section">
                    <h3>订阅更新</h3>
                    <p class="subscribe-desc">订阅我们的邮件，第一时间获取产品更新和优惠信息</p>
                    <div class="subscribe-form">
                        <input 
                            type="email" 
                            class="subscribe-input" 
                            placeholder="your@email.com"
                            v-model="email"
                        >
                        <button class="subscribe-btn" @click="subscribe">订阅</button>
                    </div>
                </div>
            </div>

            <!-- 底部版权 -->
            <div class="footer-bottom">
                <div class="copyright">© 2024 AiForEino. All rights reserved.</div>
                <div class="footer-bottom-links">
                    <a href="#">隐私政策</a>
                    <a href="#">使用条款</a>
                    <a href="#">Cookie设置</a>
                </div>
            </div>
        </div>
    </footer>
</div>

<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                email: ''
            }
        },
        methods: {
            subscribe() {
                if (this.email) {
                    alert('感谢订阅！我们会将最新资讯发送到 ' + this.email);
                    this.email = '';
                } else {
                    alert('请输入有效的邮箱地址');
                }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
